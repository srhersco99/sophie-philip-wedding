  <circle cx="18" cy="22" r="1.5" fill="#F0DC8C" opacity="0.6"/>
  <circle cx="62" cy="18" r="1.2" fill="#EAA8A8" opacity="0.55"/>
  <circle cx="22" cy="65" r="1.5" fill="#B8ACCC" opacity="0.6"/>
  <circle cx="82" cy="58" r="1.2" fill="#A8C4E0" opacity="0.55"/>
