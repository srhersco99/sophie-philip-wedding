    <ellipse cx="0" cy="-7" rx="2.5" ry="4.5" fill="#DDD8EC" opacity="0.75" transform="rotate(60)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="4.5" fill="#B8ACCC" opacity="0.75" transform="rotate(120)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="4.5" fill="#DDD8EC" opacity="0.75" transform="rotate(180)"/>
