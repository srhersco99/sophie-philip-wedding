<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-hidden="true" focusable="false">
  <!-- Corner stems -->
  <path d="M5 5 Q30 15 55 35 Q75 55 85 85" stroke="#8AAC78" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <path d="M5 5 Q20 35 25 65" stroke="#5C7A4E" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M5 5 Q35 20 65 25" stroke="#5C7A4E" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Main blush daisy (upper area) -->
