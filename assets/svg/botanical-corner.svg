    <ellipse cx="0" cy="-9" rx="3" ry="5.5" fill="#EAA8A8" opacity="0.85" transform="rotate(0)"/>
    <ellipse cx="0" cy="-9" rx="3" ry="5.5" fill="#F5D4D4" opacity="0.85" transform="rotate(45)"/>
