<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40" fill="none" aria-hidden="true" focusable="false">
  <!-- Main stem -->
  <path d="M8 32 Q25 24 40 20 Q55 16 72 10" stroke="#8AAC78" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>

  <!-- Leaf pairs -->
  <ellipse cx="22" cy="26" rx="3" ry="7" fill="#8AAC78" opacity="0.65" transform="rotate(-40,22,26)"/>
  <ellipse cx="26" cy="22" rx="3" ry="6.5" fill="#5C7A4E" opacity="0.6" transform="rotate(-20,26,22)"/>
  <ellipse cx="40" cy="20" rx="2.5" ry="6" fill="#8AAC78" opacity="0.65" transform="rotate(-55,40,20)"/>
  <ellipse cx="44" cy="16" rx="2.5" ry="5.5" fill="#5C7A4E" opacity="0.6" transform="rotate(-30,44,16)"/>
  <ellipse cx="58" cy="14" rx="2.5" ry="5.5" fill="#8AAC78" opacity="0.6" transform="rotate(-50,58,14)"/>
  <ellipse cx="62" cy="11" rx="2" ry="5" fill="#5C7A4E" opacity="0.55" transform="rotate(-25,62,11)"/>

  <!-- Blush flower at end -->
  <g transform="translate(72,10)">
    <circle cx="0" cy="0" r="3" fill="#F0DC8C" opacity="0.95"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="4.5" fill="#EAA8A8" opacity="0.85" transform="rotate(0)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="4.5" fill="#F5D4D4" opacity="0.85" transform="rotate(45)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="4.5" fill="#EAA8A8" opacity="0.85" transform="rotate(90)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="4.5" fill="#F5D4D4" opacity="0.85" transform="rotate(135)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="4.5" fill="#EAA8A8" opacity="0.85" transform="rotate(180)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="4.5" fill="#F5D4D4" opacity="0.85" transform="rotate(225)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="4.5" fill="#EAA8A8" opacity="0.85" transform="rotate(270)"/>
    <ellipse cx="0" cy="-7" rx="2.5" ry="4.5" fill="#F5D4D4" opacity="0.85" transform="rotate(315)"/>
  </g>

  <!-- Small lavender bud mid-stem -->
  <g transform="translate(38,22)">
    <circle cx="0" cy="0" r="2" fill="#B8ACCC" opacity="0.85"/>
    <ellipse cx="0" cy="-5" rx="1.8" ry="3.5" fill="#B8ACCC" opacity="0.75" transform="rotate(0)"/>
    <ellipse cx="0" cy="-5" rx="1.8" ry="3.5" fill="#DDD8EC" opacity="0.75" transform="rotate(60)"/>
    <ellipse cx="0" cy="-5" rx="1.8" ry="3.5" fill="#B8ACCC" opacity="0.75" transform="rotate(120)"/>
    <ellipse cx="0" cy="-5" rx="1.8" ry="3.5" fill="#DDD8EC" opacity="0.75" transform="rotate(180)"/>
    <ellipse cx="0" cy="-5" rx="1.8" ry="3.5" fill="#B8ACCC" opacity="0.75" transform="rotate(240)"/>
    <ellipse cx="0" cy="-5" rx="1.8" ry="3.5" fill="#DDD8EC" opacity="0.75" transform="rotate(300)"/>
  </g>

  <!-- Dot buds -->
  <circle cx="14" cy="30" r="1.5" fill="#F0DC8C" opacity="0.6"/>
  <circle cx="52" cy="15" r="1.2" fill="#A8C4E0" opacity="0.6"/>
</svg>
